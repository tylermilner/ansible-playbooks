---
dependency:
  name: galaxy
driver:
  name: vagrant
  provider:
    name: virtualbox
platforms:
  - name: ubuntu-test
    box: bento/ubuntu-22.04
    memory: 1024
    cpus: 1
provisioner:
  name: ansible
  playbooks:
    converge: converge.yml
    verify: verify.yml
  inventory:
    group_vars:
      all:
        homelab_user: vagrant
verifier:
  name: ansible
