---
- name: Configure MacBook Pro Ubuntu Desktop homelab node
  hosts: localhost
  connection: local
  become: false

  vars:
    homelab_user: ubuntu # Match the username that was created during the Ubuntu installation

  tasks:
    - name: Install uv Python package manager
      shell: curl -LsSf https://astral.sh/uv/install.sh | sh
      args:
        # Skip if uv is already installed
        creates: /home/{{ homelab_user }}/.local/bin/uv
      become_user: "{{ homelab_user }}" # Run as the target user
